<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokemon Team Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="box">
    <h2 class="center">Pokemon Team Builder</h2>

    <div class="row">
      <label for="pokemonInput"><b>Name or ID</b></label>
      <input id="pokemonInput" type="text" placeholder="snorlax or 143">
      <button id="findButton">Find</button>
    </div>

    <p id="message" class="center"></p>

    <div id="pokemonViewer" class="center" style="display:none;">
      <div class="row">
        <img id="pokemonImage" alt="Pokemon" width="220" hidden>
      </div>

      <div class="row">
        <audio id="pokemonAudio" controls></audio>
      </div>
    </div>

      <div class="row">
        <select id="moveDropdown1"></select>
        <select id="moveDropdown2"></select>
      </div>

      <div class="row">
        <select id="moveDropdown3"></select>
        <select id="moveDropdown4"></select>
      </div>

      <div class="row">
        <button id="addToTeamButton">Add to Team</button>
      </div>

    <div id="teamSection" style="display:none;">
      <h3 class="center">Your Team</h3>

      <table>
        <thead>
          <tr>
            <th style="width: 160px;">Pokemon</th>
            <th>Moves</th>
          </tr>
        </thead>
        <tbody id="teamTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
